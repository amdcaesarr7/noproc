<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>NoProc | Premium Productivity</title>
    <meta name="description"
        content="NoProc — A premium, distraction-free productivity dashboard with focus timer, task management, ambient sounds, and Spotify integration.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/settings.css">
</head>

<body class="dark-theme gradient-aurora">
    <!-- Animated Background -->
    <div class="bg-wrapper">
        <div class="gradient-bg"></div>
        <div class="blobs-container" id="blobs-container"></div>
        <!-- Wallpaper layer injected by settings.js -->
    </div>

    <!-- App Shell -->
    <div class="app-shell">
        <aside class="sidebar glass">
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="zap"></i>
                </div>
                <span class="logo-text">NoProc</span>
            </div>

            <nav class="nav-menu stagger-in">
                <button class="nav-item active" data-page="home">
                    <i data-lucide="home"></i>
                    <span>Home</span>
                </button>
                <button class="nav-item" data-page="focus">
                    <i data-lucide="target"></i>
                    <span>Focus</span>
                </button>
                <button class="nav-item" data-page="tasks">
                    <i data-lucide="check-square"></i>
                    <span>Tasks</span>
                </button>
                <button class="nav-item" data-page="stats">
                    <i data-lucide="bar-chart-3"></i>
                    <span>Stats</span>
                </button>
                <button class="nav-item" data-page="sounds">
                    <i data-lucide="music"></i>
                    <span>Ambient</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="theme-toggle" title="Toggle Theme (O)">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
                <button class="settings-btn" title="Settings">
                    <i data-lucide="settings"></i>
                </button>
                <!-- User avatar injected by settings.js if logged in -->
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="greeting-area">
                    <h1 id="greeting">Good Morning</h1>
                    <p id="date-display">Wednesday, March 5</p>
                </div>
                <div class="header-clock" id="header-clock">06:14</div>
            </header>

            <section class="page-container" id="page-container">
                <!-- Home Page -->
                <div id="home-page" class="page active">
                    <div class="hero-clock-container">
                        <div class="clock-large" id="large-clock">06:14:18</div>
                        <div class="quote-container glass">
                            <p id="quote-text">"The only way to do great work is to love what you do."</p>
                            <span id="quote-author">— Steve Jobs</span>
                        </div>
                    </div>
                </div>

                <!-- Focus Page -->
                <div id="focus-page" class="page">
                    <div class="timer-container">
                        <div class="timer-modes">
                            <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
                            <button class="mode-btn" data-mode="short-break">Short Break</button>
                            <button class="mode-btn" data-mode="long-break">Long Break</button>
                            <button class="mode-btn" data-mode="stopwatch">Stopwatch</button>
                        </div>

                        <div class="radial-progress-wrapper">
                            <svg class="radial-progress-svg" width="320" height="320" viewBox="0 0 320 320">
                                <defs>
                                    <linearGradient id="timer-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color: var(--accent-primary)" />
                                        <stop offset="100%" style="stop-color: var(--accent-secondary)" />
                                    </linearGradient>
                                </defs>
                                <circle class="progress-bg" cx="160" cy="160" r="140"></circle>
                                <circle class="progress-bar" id="timer-progress" cx="160" cy="160" r="140"
                                    stroke-dasharray="879.6" stroke-dashoffset="0"></circle>
                            </svg>
                            <div class="timer-time-display">
                                <div class="time-val" id="timer-val">25:00</div>
                                <div class="time-label" id="timer-status">Focusing</div>
                            </div>
                        </div>

                        <div class="timer-controls">
                            <button class="btn-secondary tap-scale" id="timer-reset">
                                <i data-lucide="rotate-ccw"></i>
                            </button>
                            <button class="play-pause-btn tap-scale" id="timer-toggle">
                                <i data-lucide="play" id="play-pause-icon"></i>
                            </button>
                            <button class="btn-secondary tap-scale" id="timer-settings">
                                <i data-lucide="sliders-horizontal"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Tasks Page -->
                <div id="tasks-page" class="page">
                    <div class="tasks-container">
                        <div class="tasks-header">
                            <h2>Daily Goals</h2>
                            <div class="tasks-stats">
                                <span id="tasks-count">0 tasks</span>
                            </div>
                        </div>

                        <div class="add-task-area glass">
                            <input type="text" id="task-input" placeholder="What's your next priority?">
                            <button id="add-task-btn" class="btn-primary tap-scale">
                                <i data-lucide="plus"></i>
                                <span>Add</span>
                            </button>
                        </div>

                        <div class="tasks-list stagger-in" id="tasks-list">
                            <!-- Tasks injected -->
                        </div>
                    </div>
                </div>

                <!-- Stats Page -->
                <div id="stats-page" class="page">
                    <div class="stats-container">
                        <div class="stats-header">
                            <h2>Focus Analytics</h2>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card glass hover-lift">
                                <h3>Total Focus Time</h3>
                                <p id="total-focus-time">0h 0m</p>
                            </div>
                            <div class="stat-card glass hover-lift">
                                <h3>Sessions Completed</h3>
                                <p id="total-sessions">0</p>
                            </div>
                        </div>
                        <div class="chart-container glass">
                            <canvas id="focus-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Sounds Page -->
                <div id="sounds-page" class="page">
                    <div class="sounds-container">
                        <div class="sounds-header">
                            <h2>Ambient Soundscapes</h2>
                        </div>
                        <div class="sounds-grid stagger-in" id="sounds-grid">
                            <!-- Sound cards injected -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Mobile Bottom Navigation (Visible only on <= 900px) -->
    <nav class="mobile-bottom-nav glass">
        <button class="nav-item active" data-page="home">
            <i data-lucide="home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" data-page="focus">
            <i data-lucide="target"></i>
            <span>Focus</span>
        </button>
        <button class="nav-item" data-page="tasks">
            <i data-lucide="check-square"></i>
            <span>Tasks</span>
        </button>
        <button class="nav-item" data-page="sounds">
            <i data-lucide="music"></i>
            <span>Ambient</span>
        </button>
        <button class="settings-btn" title="Settings">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </button>
    </nav>

    <!-- Spotify Miniplayer (Mobile: bottom bar  |  Desktop: vertical hover pill) -->
    <div class="mini-player" id="mini-player">
        <div class="player-content">
            <div class="player-left">
                <div class="player-cover-wrap">
                    <img id="player-cover"
                        src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200&h=200&auto=format&fit=crop"
                        alt="Album Art">
                    <div class="liquid-glow" id="player-glow"></div>
                </div>
                <div class="player-info">
                    <h4 id="player-title">No Track</h4>
                    <p id="player-artist">Ready to focus?</p>
                </div>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="control-btn tap-scale" onclick="window.app.controlMusic('previous')">
                        <i data-lucide="skip-back"></i>
                    </button>
                    <button class="play-btn tap-scale" onclick="window.app.controlMusic('playPause')">
                        <i data-lucide="play" id="main-play-icon"></i>
                    </button>
                    <button class="control-btn tap-scale" onclick="window.app.controlMusic('next')">
                        <i data-lucide="skip-forward"></i>
                    </button>
                </div>
                <div class="player-progress-container">
                    <span class="p-time" id="p-current">0:00</span>
                    <div class="p-bar">
                        <div class="p-fill" id="p-fill"></div>
                    </div>
                    <span class="p-time" id="p-total">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button class="spotify-login-btn mobile-only" id="spotify-login">
                    <i data-lucide="music-2"></i>
                    <span>Connect Spotify</span>
                </button>
                <div class="vol-control">
                    <i data-lucide="volume-2"></i>
                    <input type="range" min="0" max="100" value="80" id="player-vol">
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/timer.js"></script>
    <script type="module" src="js/tasks.js"></script>
    <script type="module" src="js/stats.js"></script>
    <script type="module" src="js/sounds.js"></script>
    <script type="module" src="js/settings.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/spotify.js"></script>
    <script type="module">
        lucide.createIcons();
    </script>
</body>

</html>
